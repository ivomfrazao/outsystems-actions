<!DOCTYPE html>
<html>
<head>
  <title>OutSystems Actions</title>
  <style>
    body { width: 300px; padding: 10px; font-family: Arial, sans-serif; }
    .deployment-item { margin-bottom: 10px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    .deployment-meta { font-size: 0.85em; color: #555; margin-top: 2px; }
    .deployment-link { font-size: 0.85em; }
    .tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 0.75em;
      font-weight: bold;
      vertical-align: middle;
      margin-left: 4px;
    }
    .tag-in-progress  { background: #fff3cd; color: #856404; }
    .tag-success      { background: #d4edda; color: #155724; }
    .tag-warning      { background: #fff3cd; color: #856404; }
    .tag-error        { background: #f8d7da; color: #721c24; }
    .tag-intervention { background: #f8d7da; color: #721c24; }
    .prefs label { display: block; margin-top: 4px; }
    .empty { color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <h3>Deployments</h3>
  <div id="deployments"></div>
  <h3>Notification Preferences</h3>
  <div class="prefs">
    <label><input type="checkbox" id="notifySuccess"> Success</label>
    <label><input type="checkbox" id="notifyWarning"> Warning</label>
    <label><input type="checkbox" id="notifyError"> Error</label>
    <label><input type="checkbox" id="notifyIntervention"> Intervention</label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
